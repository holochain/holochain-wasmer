name: run tests

on:
  push:
    branches:
      - main
  pull_request: {}

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-and-bench:
    strategy:
      fail-fast: false
      matrix:
        script: ["test", "bench"]
        os: ["ubuntu-latest", "macos-latest"]
        wasmer-feature: ["wasmer_sys_cranelift", "wasmer_sys_llvm", "wasmer_wasmi"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: increase swap space
        if: matrix.os == 'ubuntu-latest'
        uses: actionhippie/swap-space@v1
        with:
          size: 15G
      - uses: actions/checkout@v6
      - name: Install nix
        uses: cachix/install-nix-action@v31
      - name: Setup cachix
        uses: cachix/cachix-action@v17
        with:
          name: holochain-ci
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix develop --command ./scripts/${{ matrix.script }}-${{ matrix.wasmer-feature }}.sh

  # Verifies the additivity guarantee: every backend feature can be enabled in
  # the same build. If this leg ever fails, something has re-introduced a
  # mutual exclusion between backends or compilers.
  test-all-backends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install nix
        uses: cachix/install-nix-action@v31
      - name: Setup cachix
        uses: cachix/cachix-action@v17
        with:
          name: holochain-ci
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: build host crate with all backends enabled
        run: |
          nix develop --command cargo build -p holochain_wasmer_host \
            --no-default-features \
            --features error_as_host,wasmer_sys,wasmer_sys_cranelift,wasmer_sys_llvm,wasmer_wasmi
      - name: test the host crate with all backends enabled
        run: |
          nix develop --command cargo test -p holochain_wasmer_host \
            --no-default-features \
            --features error_as_host,wasmer_sys,wasmer_sys_cranelift,wasmer_sys_llvm,wasmer_wasmi \
            -- --nocapture

  test-windows:
    strategy:
      fail-fast: false
      matrix:
        wasmer-feature: ["wasmer_sys_cranelift", "wasmer_sys_llvm", "wasmer_wasmi"]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      # The prebuilt LLVM is needed by `wasmer_sys_llvm` (which links against
      # llvm-sys 211) and by `wasmer_wasmi` (whose wasmer build script invokes
      # bindgen and needs `libclang.dll`). It is harmless for `wasmer_sys_cranelift`.
      - name: Install LLVM
        env:
          LLVM_DIR: .llvm
        shell: bash
        run: |
          LLVM_DIR=$(pwd)/${{ env.LLVM_DIR }}
          mkdir -p ${LLVM_DIR}
          curl --proto '=https' --tlsv1.2 -sSf "https://github.com/wasmerio/llvm-custom-builds/releases/download/21.x/llvm-windows-amd64.tar.xz" -L -o - | tar xJv -C ${LLVM_DIR}
      - name: test root
        shell: pwsh
        run: |
          $env:LLVM_SYS_211_PREFIX="$(pwd)/.llvm"
          $env:LIBCLANG_PATH="$(pwd)/.llvm/bin"
          cargo test --release --no-default-features --features error_as_host,${{ matrix.wasmer-feature }} -- --nocapture
      - name: test
        shell: pwsh
        run: |
          $env:LLVM_SYS_211_PREFIX="$(pwd)/.llvm"
          $env:LIBCLANG_PATH="$(pwd)/.llvm/bin"
          cargo test --release -p tests --no-default-features --features ${{ matrix.wasmer-feature }} -- --nocapture

  ci_pass:
    if: ${{ always() }}
    runs-on: "ubuntu-latest"
    needs:
      - test-and-bench
      - test-all-backends
      - test-windows
    steps:
      - name: check status
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
