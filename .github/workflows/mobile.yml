name: build for mobile

on:
  push:
    branches:
      - main
  pull_request: {}

concurrency:
  group: mobile-${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-linux-android
          - aarch64-linux-android
          - armv7-linux-androideabi
        wasmer-feature:
          - wasmer-sys-cranelift
          - wasmer-v8
        # Our synchwire/v8-custom-builds fork only builds V8 for
        # aarch64-linux-android. x86_64 and armv7 Android have no V8
        # tarball available, so exclude them from the wasmer-v8 matrix.
        exclude:
          - target: x86_64-linux-android
            wasmer-feature: wasmer-v8
          - target: armv7-linux-androideabi
            wasmer-feature: wasmer-v8
    steps:
      - uses: actions/checkout@v6

      - name: Install Cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross@0.2.5

      - name: Build
        run: |
          cross build --target ${{ matrix.target }} --release \
            --package holochain_wasmer_host \
            --no-default-features --features error-as-host,${{ matrix.wasmer-feature }}

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      # wasmer's v8 build.rs shells out to llvm-objcopy and needs the
      # iOS SDK headers (via `xcrun`) to generate bindings. macOS
      # runners don't put llvm-objcopy on PATH by default — Xcode
      # ships it only under xcrun — so install brew LLVM and prepend
      # its bin directory.
      - name: Install LLVM (for llvm-objcopy)
        run: |
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Install Rust iOS target
        run: rustup target add aarch64-apple-ios

      - name: Build for iOS
        run: |
          cargo build --target aarch64-apple-ios --release \
            --package holochain_wasmer_host \
            --no-default-features --features error-as-host,wasmer-v8
