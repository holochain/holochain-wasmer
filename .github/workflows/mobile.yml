name: build for mobile

on:
  push:
    branches:
      - main
  pull_request: {}

concurrency:
  group: mobile-${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-linux-android
          - aarch64-linux-android
          - armv7-linux-androideabi
        wasmer-feature:
          - wasmer-sys-cranelift
          # wasmer-v8 on Android is disabled everywhere for two
          # separate reasons:
          #   * x86_64 and armv7: synchwire/v8-custom-builds does
          #     not ship V8 archives for these targets.
          #   * aarch64: the cross-rs container uses a GCC (not NDK
          #     clang) toolchain that is too old to parse V8 13.6's
          #     cppgc/v8-internal headers — it chokes on C++20
          #     features like class-type non-type template
          #     parameters. Switching cross-rs to a clang-based
          #     Android image is out of scope for this PR; re-enable
          #     once that's arranged.
    steps:
      - uses: actions/checkout@v6

      - name: Install Cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross@0.2.5

      - name: Build
        run: |
          cross build --target ${{ matrix.target }} --release \
            --package holochain_wasmer_host \
            --no-default-features --features error-as-host,${{ matrix.wasmer-feature }}

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      # wasmer's v8 build.rs shells out to llvm-objcopy and needs the
      # iOS SDK headers (via `xcrun`) to generate bindings. macOS
      # runners don't put llvm-objcopy on PATH by default — Xcode
      # ships it only under xcrun — so install brew LLVM and prepend
      # its bin directory.
      - name: Install LLVM (for llvm-objcopy)
        run: |
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Install Rust iOS target
        run: rustup target add aarch64-apple-ios

      - name: Build for iOS
        run: |
          cargo build --target aarch64-apple-ios --release \
            --package holochain_wasmer_host \
            --no-default-features --features error-as-host,wasmer-v8
