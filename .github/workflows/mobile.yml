name: build for mobile

on:
  push:
    branches:
      - main
  pull_request: {}

concurrency:
  group: mobile-${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-linux-android
          - aarch64-linux-android
          - armv7-linux-androideabi
        wasmer-feature:
          - wasmer_sys_dev
          - wasmer_wasmi
    steps:
      - uses: actions/checkout@v6

      - name: Install Cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross@0.2.5

      - name: Build
        run: |
          cross build --target ${{ matrix.target }} --release \
            --package holochain_wasmer_host \
            --no-default-features --features error_as_host,${{ matrix.wasmer-feature }}

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install binutils for objcopy
        run: |
          brew install binutils
          echo "/opt/homebrew/opt/binutils/bin" >> $GITHUB_PATH

      - name: Build for iOS
        run: |
          cargo build --target aarch64-apple-ios --release \
            --package holochain_wasmer_host \
            --no-default-features --features error_as_host,wasmer_wasmi
